<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bird Species Detection AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#00c6ff33,transparent 70%);
top:-250px;
right:-200px;
animation:float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(60px)}
}

.main-container{
width:95%;
max-width:1200px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* HEADER */

header{
text-align:center;
margin-bottom:30px;
}

header h1{
font-size:36px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:.8;
margin-top:5px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.06);
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* BUTTONS */

.buttons{
margin-top:20px;
}

button{
padding:12px 26px;
border:none;
border-radius:30px;
margin-right:10px;
font-weight:600;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
transition:.3s;
box-shadow:0 5px 15px rgba(0,198,255,.4);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,198,255,.7);
}

/* STATUS */

#status{
margin-top:15px;
color:#ffc107;
}

/* RESULT */

.result-box{
margin-top:15px;
font-size:20px;
font-weight:600;
color:#00e5ff;
}

/* CONFIDENCE BAR */

.progress{
width:100%;
height:25px;
background:rgba(255,255,255,.1);
border-radius:50px;
margin-top:15px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffcc,#00c6ff);
transition:width 1s;
}

/* CANVAS */

canvas{
width:100%;
margin-top:20px;
border-radius:15px;
background:rgba(0,0,0,.4);
}

/* BIRD IMAGE */

.bird-img{
width:100%;
border-radius:15px;
margin-top:15px;
display:none;
}

/* LOADING */

.loader{
border:5px solid rgba(255,255,255,.2);
border-top:5px solid #00c6ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:20px auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* MOBILE */

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="main-container">

<header>
<h1>🐦 Bird Species Detection</h1>
<p class="subtitle">AI Bio-Acoustic Recognition System</p>
</header>

<div class="grid">

<!-- LEFT PANEL -->

<div class="card">

<h3>Audio Input</h3>

<div class="buttons">
<button onclick="startRecording()">🎤 Record</button>

<input type="file" id="fileInput" accept=".wav" hidden>
<button onclick="document.getElementById('fileInput').click()">📂 Upload</button>
</div>

<div id="status">Ready to analyze bird sound...</div>

<div class="loader" id="loader"></div>

<canvas id="waveCanvas" width="500" height="200"></canvas>

</div>

<!-- RIGHT PANEL -->

<div class="card">

<h3>Detection Result</h3>

<div class="result-box" id="result">
Prediction will appear here
</div>

<div class="progress">
<div class="progress-fill" id="confidenceFill"></div>
</div>

<img id="birdImage" class="bird-img">

</div>

</div>

</div>

<script>

let mediaRecorder;
let audioChunks=[];
let audioContext;
let analyser;
let dataArray;

let canvas=document.getElementById("waveCanvas");
let ctx=canvas.getContext("2d");

async function startRecording(){

document.getElementById("status").innerText="Recording...";
document.getElementById("loader").style.display="block";

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

mediaRecorder=new MediaRecorder(stream);

audioContext=new(window.AudioContext||window.webkitAudioContext)();

const source=audioContext.createMediaStreamSource(stream);

analyser=audioContext.createAnalyser();

source.connect(analyser);

analyser.fftSize=2048;

const bufferLength=analyser.frequencyBinCount;

dataArray=new Uint8Array(bufferLength);

drawWave();

audioChunks=[];

mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);

mediaRecorder.onstop=async()=>{

const blob=new Blob(audioChunks,{type:'audio/wav'});

sendToBackend(blob);

};

mediaRecorder.start();

setTimeout(()=>mediaRecorder.stop(),5000);

}

function drawWave(){

requestAnimationFrame(drawWave);

if(!analyser) return;

analyser.getByteTimeDomainData(dataArray);

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.lineWidth=2;
ctx.strokeStyle="#00c6ff";
ctx.beginPath();

let sliceWidth=canvas.width/dataArray.length;

let x=0;

for(let i=0;i<dataArray.length;i++){

let v=dataArray[i]/128.0;

let y=v*canvas.height/2;

if(i===0) ctx.moveTo(x,y);

else ctx.lineTo(x,y);

x+=sliceWidth;

}

ctx.stroke();

}

document.getElementById("fileInput").addEventListener("change",function(){

const file=this.files[0];

if(file) sendToBackend(file);

});

async function sendToBackend(file){

document.getElementById("status").innerText="AI Processing...";
document.getElementById("loader").style.display="block";

let formData=new FormData();

formData.append("file",file);

try{

const response=await fetch("http://localhost:5000/predict",{
method:"POST",
body:formData
});

const data=await response.json();

document.getElementById("loader").style.display="none";

document.getElementById("status").innerText="Analysis Complete ✅";

document.getElementById("result").innerText=
"🐦 "+data.prediction+" | Confidence: "+data.confidence+"%";

document.getElementById("confidenceFill").style.width=
data.confidence+"%";

document.getElementById("birdImage").src=
"https://source.unsplash.com/600x400/?"+data.prediction+",bird";

document.getElementById("birdImage").style.display="block";

}
catch(error){

document.getElementById("loader").style.display="none";

document.getElementById("status").innerText="Server Error ❌";

}

}

</script>

</body>
</html>
